services:
  postgres:
    image: postgres:16-alpine
    container_name: polymind-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - prod_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: polymind-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - prod_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: polymind-prod-redis
    restart: unless-stopped
    volumes:
      - prod_redisdata:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymind-prod-web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${JWT_KEY}
      # Super admin thật cho production (KHÔNG có tài khoản mẫu Admin@123 ở Production).
      SuperAdmin__Email: ${SUPERADMIN_EMAIL}
      SuperAdmin__Password: ${SUPERADMIN_PASSWORD}
      SuperAdmin__FullName: ${SUPERADMIN_FULLNAME:-Super Admin}
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ROOT_USER}
      Minio__SecretKey: ${MINIO_ROOT_PASSWORD}
      Minio__Bucket: ${MINIO_BUCKET}
      Minio__UseSsl: "false"
      Notifications__Email__Enabled: ${SMTP_ENABLED:-false}
      Notifications__Email__Host: ${SMTP_HOST:-}
      Notifications__Email__Port: ${SMTP_PORT:-587}
      Notifications__Email__UseSsl: ${SMTP_USE_SSL:-true}
      Notifications__Email__Username: ${SMTP_USERNAME:-}
      Notifications__Email__Password: ${SMTP_PASSWORD:-}
      Notifications__Email__FromEmail: ${SMTP_FROM_EMAIL:-no-reply@polymind.local}
      Notifications__Email__FromName: ${SMTP_FROM_NAME:-POLYMIND}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - prod_weblogs:/app/logs

  # Reverse proxy — chọn 1 trong 2 bằng --profile:
  #   --profile caddy : Caddy tự cấp Let's Encrypt qua DuckDNS (khuyến nghị, cần port-forward 80/443).
  #   --profile nginx : Nginx với cert thủ công trong deploy/nginx/certs (fallback/legacy).
  nginx:
    image: nginx:1.27-alpine
    container_name: polymind-prod-nginx
    restart: unless-stopped
    profiles: ["nginx"]
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro

  caddy:
    image: caddy:2-alpine
    container_name: polymind-prod-caddy
    restart: unless-stopped
    profiles: ["caddy"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - web
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - prod_caddydata:/data
      - prod_caddyconfig:/config

  # Cập nhật bản ghi DuckDNS về public IP hiện tại (chỉ cần khi IP động/CGNAT-free).
  # Bật bằng: --profile caddy --profile duckdns
  duckdns:
    image: lscr.io/linuxserver/duckdns:latest
    container_name: polymind-prod-duckdns
    restart: unless-stopped
    profiles: ["duckdns"]
    environment:
      SUBDOMAINS: ${DUCKDNS_SUBDOMAIN}
      TOKEN: ${DUCKDNS_TOKEN}
      TZ: Asia/Ho_Chi_Minh

volumes:
  prod_pgdata:
  prod_miniodata:
  prod_redisdata:
  prod_weblogs:
  prod_caddydata:
  prod_caddyconfig:
